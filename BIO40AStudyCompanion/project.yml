name: BIO40AStudyCompanion
options:
  bundleIdPrefix: com.bio40a
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: true
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_KEY_UILaunchScreen_Generation: true
    INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

targets:
  BIO40AStudyCompanion:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Models
      - path: Services
      - path: Views
      - path: Extensions
      - path: Resources/Content
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bio40a.studycompanion
        PRODUCT_NAME: "BIO 40A Study"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: "BIO 40A Study"
        DEVELOPMENT_TEAM: 9TUXM4MBAV
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        INFOPLIST_KEY_NSCameraUsageDescription: "Take photos of handouts, worksheets, and returned exams to add to your study materials"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Select photos of class materials to add to your study library"
